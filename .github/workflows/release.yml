name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: ctf-tui
            asset: ctf-tui-linux-x86_64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: ctf-tui
            asset: ctf-tui-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: ctf-tui
            asset: ctf-tui-macos-aarch64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: ctf-tui.exe
            asset: ctf-tui-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/
          tar -czf ${{ matrix.asset }} -C dist ${{ matrix.bin }}

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.bin }} dist/
          Compress-Archive -Path dist/${{ matrix.bin }} -DestinationPath ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p out
          find artifacts -type f -maxdepth 2 -exec cp {} out/ \;
          sha256sum out/* > out/checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            out/*
